  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\" opacity=\".8\"/>\n      <rect x=\"248\" y=\"70\" width=\"118\" height=\"6\" rx=\"2\" fill=\"${MT}\" opacity=\".6\"/>\n      <rect x=\"248\" y=\"80\" width=\"128\" height=\"6\" rx=\"2\" fill=\"${MT}\" opacity=\".6\"/>\n      <rect x=\"248\" y=\"90\" width=\"100\" height=\"6\" rx=\"2\" fill=\"${MT}\" opacity=\".6\"/>\n      <rect x=\"248\" y=\"110\" width=\"128\" height=\"6\" rx=\"2\" fill=\"${MT}\" opacity=\".4\"/>\n      <rect x=\"248\" y=\"120\" width=\"112\" height=\"6\" rx=\"2\" fill=\"${MT}\" opacity=\".4\"/>\n      <text x=\"312\" y=\"186\" fill=\"${A}\" font-size=\"9\" font-family=\"monospace\" text-anchor=\"middle\">Vertex AI Engine ✓<\u002Ftext>\n    <\u002Fsvg>`,\n\n    // 4 — Restaurant Chatbot\n    `<svg viewBox=\"0 0 400 220\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:100%;display:block\">\n      <rect width=\"400\" height=\"220\" fill=\"${BG}\"/>\n      <!-- phone frame -->\n      <rect x=\"100\" y=\"10\" width=\"200\" height=\"200\" rx=\"14\" fill=\"${BG2}\" stroke=\"${LN}\" stroke-width=\"1.5\"/>\n      <!-- header -->\n      <rect x=\"100\" y=\"10\" width=\"200\" height=\"40\" rx=\"14 14 0 0\" fill=\"${BG3}\"/>\n      <rect x=\"100\" y=\"36\" width=\"200\" height=\"14\" fill=\"${BG3}\"/>\n      <circle cx=\"130\" cy=\"30\" r=\"12\" fill=\"${A2}\" stroke=\"${A}\" stroke-width=\"1\"/>\n      <text x=\"130\" y=\"34\" fill=\"${A}\" font-size=\"10\" text-anchor=\"middle\">🍽<\u002Ftext>\n      <text x=\"158\" y=\"27\" fill=\"${TX}\" font-size=\"11\" font-weight=\"bold\" font-family=\"sans-serif\">RestaurantBot<\u002Ftext>\n      <circle cx=\"156\" cy=\"36\" r=\"4\" fill=\"#4ad8a0\"/>\n      <text x=\"163\" y=\"39\" fill=\"#4ad8a0\" font-size=\"8\" font-family=\"monospace\">online<\u002Ftext>\n      <!-- messages -->\n      <!-- user msg 1 -->\n      <rect x=\"178\" y=\"60\" width=\"108\" height=\"26\" rx=\"12 12 2 12\" fill=\"${A2}\" stroke=\"${A}\" stroke-width=\"1\"/>\n      <text x=\"232\" y=\"77\" fill=\"${TX}\" font-size=\"9\" text-anchor=\"middle\" font-family=\"sans-serif\">Table for 2 at 7pm?<\u002Ftext>\n      <!-- bot msg 1 -->\n      <rect x=\"114\" y=\"94\" width=\"136\" height=\"34\" rx=\"12 12 12 2\" fill=\"${BG3}\" stroke=\"${LN}\" stroke-width=\"1\"/>\n      <text x=\"182\" y=\"108\" fill=\"${TX}\" font-size=\"9\" text-anchor=\"middle\" font-family=\"sans-serif\">Yes! Available at 7pm.<\u002Ftext>\n      <text x=\"182\" y=\"121\" fill=\"${MT}\" font-size=\"8\" text-anchor=\"middle\" font-family=\"sans-serif\">Shall I confirm the booking?<\u002Ftext>\n      <!-- user msg 2 -->\n      <rect x=\"206\" y=\"136\" width=\"80\" height=\"22\" rx=\"10 10 2 10\" fill=\"${A2}\" stroke=\"${A}\" stroke-width=\"1\"/>\n      <text x=\"246\" y=\"151\" fill=\"${TX}\" font-size=\"9\" text-anchor=\"middle\" font-family=\"sans-serif\">Yes please!<\u002Ftext>\n      <!-- bot msg 2 -->\n      <rect x=\"114\" y=\"166\" width=\"150\" height=\"22\" rx=\"10 10 10 2\" fill=\"${BG3}\" stroke=\"${LN}\" stroke-width=\"1\"/>\n      <circle cx=\"126\" cy=\"177\" r=\"5\" fill=\"#4ad8a0\" opacity=\".3\"/>\n      <text x=\"133\" y=\"181\" fill=\"#4ad8a0\" font-size=\"9\" font-family=\"sans-serif\">Booking confirmed ✓<\u002Ftext>\n      <!-- AWS badge -->\n      <rect x=\"110\" y=\"196\" width=\"180\" height=\"10\" rx=\"2\" fill=\"${BG}\"/>\n      <text x=\"200\" y=\"205\" fill=\"${MT}\" font-size=\"7\" font-family=\"monospace\" text-anchor=\"middle\">AWS Bedrock · Lambda · DynamoDB<\u002Ftext>\n    <\u002Fsvg>`,\n\n    // 5 — N-gram Language Model\n    `<svg viewBox=\"0 0 400 220\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:100%;display:block\">\n      <rect width=\"400\" height=\"220\" fill=\"${BG}\"/>\n      <!-- title -->\n      <text x=\"20\" y=\"32\" fill=\"${TX}\" font-size=\"13\" font-family=\"monospace\" font-weight=\"bold\">P(w | context)<\u002Ftext>\n      <rect x=\"20\" y=\"36\" width=\"360\" height=\"1\" fill=\"${LN}\"/>\n      <!-- perplexity badge -->\n      <rect x=\"280\" y=\"14\" width=\"100\" height=\"22\" rx=\"6\" fill=\"${BG2}\" stroke=\"${LN}\" stroke-width=\"1\"/>\n      <text x=\"290\" y=\"26\" fill=\"${MT}\" font-size=\"8\" font-family=\"monospace\">PPL: <\u002Ftext>\n      <text x=\"316\" y=\"26\" fill=\"${A}\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">47.3<\u002Ftext>\n      <!-- token probability bars -->\n      ${[\n        ['\"the\"', 0.34, A],\n        ['\"a\"',   0.21, A],\n        ['\"his\"', 0.15, '#7c6af0'],\n        ['\"this\"',0.11, '#7c6af0'],\n        ['\"her\"', 0.08, MT],\n        ['\"its\"', 0.06, MT],\n        ['\"that\"',0.05, MT],\n      ].map(([word, prob, col], i) => `\n        <text x=\"75\" y=\"${58 + i*22}\" fill=\"${col === MT ? MT : TX}\" font-size=\"10\" font-family=\"monospace\" text-anchor=\"end\">${word}<\u002Ftext>\n        <rect x=\"82\" y=\"${46 + i*22}\" width=\"${prob * 260}\" height=\"14\" rx=\"3\" fill=\"${col}\" opacity=\"${col === MT ? '.35' : '.5'}\"/>\n        <rect x=\"82\" y=\"${46 + i*22}\" width=\"${prob * 260}\" height=\"4\" rx=\"3\" fill=\"${col}\" opacity=\"${col === MT ? '.2' : '.3'}\"/>\n        <text x=\"${82 + prob*260 + 6}\" y=\"${58 + i*22}\" fill=\"${col === MT ? MT : col}\" font-size=\"9\" font-family=\"monospace\">${(prob*100).toFixed(0)}%<\u002Ftext>\n      `).join('')}\n      <!-- n-gram tabs -->\n      <rect x=\"20\" y=\"196\" width=\"360\" height=\"1\" fill=\"${LN}\"/>\n      ${['Unigram','Bigram','Trigram'].map((label, i) => `\n        <rect x=\"${20 + i*80}\" y=\"202\" width=\"72\" height=\"14\" rx=\"4\" fill=\"${i===1 ? A2 : BG2}\" stroke=\"${i===1 ? A : LN}\" stroke-width=\"1\"/>\n        <text x=\"${56 + i*80}\" y=\"213\" fill=\"${i===1 ? A : MT}\" font-size=\"8\" font-family=\"monospace\" text-anchor=\"middle\">${label}<\u002Ftext>\n      `).join('')}\n    <\u002Fsvg>`,\n\n    // 6 — Stock Price Predictor\n    `<svg viewBox=\"0 0 400 220\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:100%;display:block\">\n      <rect width=\"400\" height=\"220\" fill=\"${BG}\"/>\n      <!-- header -->\n      <rect width=\"400\" height=\"36\" fill=\"${BG2}\"/>\n      <text x=\"16\" y=\"22\" fill=\"${TX}\" font-size=\"13\" font-family=\"monospace\" font-weight=\"bold\">AAPL<\u002Ftext>\n      <text x=\"58\" y=\"22\" fill=\"#4ad8a0\" font-size=\"11\" font-family=\"monospace\">+2.14%<\u002Ftext>\n      <text x=\"120\" y=\"22\" fill=\"${MT}\" font-size=\"10\" font-family=\"monospace\">CNN Forecast<\u002Ftext>\n      <rect x=\"290\" y=\"10\" width=\"96\" height=\"16\" rx=\"4\" fill=\"${BG3}\"/>\n      <text x=\"298\" y=\"22\" fill=\"${MT}\" font-size=\"8\" font-family=\"monospace\">Apache Spark<\u002Ftext>\n      <!-- chart bg -->\n      <rect x=\"12\" y=\"44\" width=\"376\" height=\"140\" rx=\"6\" fill=\"${BG2}\" stroke=\"${LN}\" stroke-width=\"1\"/>\n      <!-- gridlines -->\n      ${[0,1,2,3,4].map(i => `<line x1=\"40\" y1=\"${56 + i*26}\" x2=\"378\" y2=\"${56 + i*26}\" stroke=\"${LN}\" stroke-width=\"1\"/>`).join('')}\n      <!-- historical line (white) -->\n      <polyline points=\"40,136 78,128 116,140 154,118 192,108 230,98\" fill=\"none\" stroke=\"${TX}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\".7\"/>\n      <!-- prediction line (accent, dashed) -->\n      <polyline points=\"230,98 268,84 306,72 344,64 378,58\" fill=\"none\" stroke=\"${A}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"6 3\"/>\n      <!-- prediction fill -->\n      <polygon points=\"230,98 268,84 306,72 344,64 378,58 378,100 344,108 306,116 268,124 230,98\" fill=\"${A}\" opacity=\".06\"/>\n      <!-- divider line -->\n      <line x1=\"230\" y1=\"50\" x2=\"230\" y2=\"184\" stroke=\"${A}\" stroke-width=\"1\" stroke-dasharray=\"3 3\" opacity=\".4\"/>\n      <text x=\"232\" y=\"60\" fill=\"${A}\" font-size=\"8\" font-family=\"monospace\" opacity=\".7\">forecast →<\u002Ftext>\n      <!-- volume bars -->\n      ${[40,78,116,154,192,230,268,306,344].map((x, i) => `\n        <rect x=\"${x}\" y=\"${176 - [8,12,6,14,10,8,7,11,5][i]}\" width=\"28\" height=\"${[8,12,6,14,10,8,7,11,5][i]}\" rx=\"2\" fill=\"${i < 5 ? TX : A}\" opacity=\"${i < 5 ? '.15' : '.25'}\"/>\n      `).join('')}\n      <!-- legend -->\n      <line x1=\"20\" y1=\"202\" x2=\"36\" y2=\"202\" stroke=\"${TX}\" stroke-width=\"2\" opacity=\".7\"/>\n      <text x=\"40\" y=\"206\" fill=\"${MT}\" font-size=\"9\" font-family=\"monospace\">Historical<\u002Ftext>\n      <line x1=\"110\" y1=\"202\" x2=\"126\" y2=\"202\" stroke=\"${A}\" stroke-width=\"2\" stroke-dasharray=\"4 2\"/>\n      <text x=\"130\" y=\"206\" fill=\"${MT}\" font-size=\"9\" font-family=\"monospace\">CNN Prediction<\u002Ftext>\n      <text x=\"280\" y=\"206\" fill=\"${MT}\" font-size=\"9\" font-family=\"monospace\">TensorFlow · Django<\u002Ftext>\n    <\u002Fsvg>`,\n  ];\n\n  // Render projects\n  document.getElementById('projects-grid').innerHTML = projects.map((p, i) => `\n    <div class=\"project-card${p.featured ? ' featured' : ''} reveal\" style=\"transition-delay:${(i % 2) * 70}ms\">\n      <div class=\"project-img\" style=\"background:#0e0e0e\">\n        ${thumbnails[i] || ''}\n      <\u002Fdiv>\n      <div class=\"project-body\">\n        <div>\n          <p class=\"project-eyebrow\">${p.eyebrow}<\u002Fp>\n          <h3 class=\"project-title${p.featured ? ' project-featured-title' : ''}\">${p.title}<\u002Fh3>\n          <p class=\"project-summary\">${p.summary}<\u002Fp>\n          <p class=\"project-highlights\">${p.highlights}<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"project-tech\">${p.tech.map(t => `<span class=\"tech-tag\">${t}<\u002Fspan>`).join('')}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  document.getElementById('year').textContent = new Date().getFullYear();\n\n  // Nav\n  const nav = document.getElementById('nav');\n  const navLinks = document.querySelectorAll('.nav-links a[href^=\"#\"]');\n  function updateNav() {\n    nav.classList.toggle('scrolled', window.scrollY > 20);\n    const sections = document.querySelectorAll('section[id]');\n    let current = '';\n    sections.forEach(s => { if (window.scrollY >= s.offsetTop - 80) current = s.id; });\n    navLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + current));\n  }\n  window.addEventListener('scroll', updateNav, { passive: true });\n\n  // Mobile nav\n  const toggle = document.getElementById('nav-toggle');\n  const linksEl = document.getElementById('nav-links');\n  toggle.addEventListener('click', () => linksEl.classList.toggle('open'));\n  document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', () => linksEl.classList.remove('open')));\n\n  // Reveal\n  function initReveal() {\n    const obs = new IntersectionObserver(entries => {\n      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }});\n    }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });\n    document.querySelectorAll('.reveal:not(.visible)').forEach(el => obs.observe(el));\n  }\n  initReveal();\n\n  // Tweaks\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"accent\": \"oklch(70% 0.16 212)\",\n    \"bg\": \"#080808\",\n    \"heroWeight\": \"500\"\n  }/*EDITMODE-END*/;\n  let tweaks = { ...TWEAK_DEFAULTS };\n  function applyTweaks() {\n    document.documentElement.style.setProperty('--accent', tweaks.accent);\n    document.documentElement.style.setProperty('--bg', tweaks.bg);\n    document.querySelector('.hero-title').style.fontWeight = tweaks.heroWeight;\n  }\n  applyTweaks();\n\n  let panel = null;\n  function buildPanel() {\n    if (panel) return;\n    panel = document.createElement('div');\n    panel.style.cssText = `position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:#111;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:1.25rem;min-width:230px;font-family:'DM Mono',monospace;font-size:.75rem;color:#aaa;box-shadow:0 8px 32px rgba(0,0,0,.7)`;\n    panel.innerHTML = `\n      <div style=\"font-weight:600;color:#eee;margin-bottom:1rem;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase\">Tweaks<\u002Fdiv>\n      <div style=\"margin-bottom:.9rem\">\n        <div style=\"color:#666;margin-bottom:.45rem\">Accent<\u002Fdiv>\n        <div style=\"display:flex;gap:.35rem;flex-wrap:wrap\">\n          ${[['Blue','oklch(70% 0.16 212)'],['Green','oklch(70% 0.14 155)'],['Rose','oklch(68% 0.16 20)'],['Amber','oklch(74% 0.15 75)']].map(([n,v])=>`<button onclick=\"setA('${v}')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:${v};color:#000;font-size:.65rem;cursor:pointer;font-family:inherit;font-weight:700\">${n}<\u002Fbutton>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:.9rem\">\n        <div style=\"color:#666;margin-bottom:.45rem\">Background<\u002Fdiv>\n        <div style=\"display:flex;gap:.35rem\">\n          ${[['Pure','#080808'],['Warm','#0d0b08'],['Cool','#07090d']].map(([n,v])=>`<button onclick=\"setB('${v}')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:${v};color:#aaa;font-size:.65rem;cursor:pointer;font-family:inherit\">${n}<\u002Fbutton>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"color:#666;margin-bottom:.45rem\">Title Weight<\u002Fdiv>\n        <div style=\"display:flex;gap:.35rem\">\n          ${[['Light','300'],['Regular','400'],['Medium','500']].map(([n,v])=>`<button onclick=\"setW('${v}')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:transparent;color:#aaa;font-size:.65rem;cursor:pointer;font-family:inherit\">${n}<\u002Fbutton>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n    document.body.appendChild(panel);\n  }\n  window.setA = v => { tweaks.accent = v; applyTweaks(); window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweaks},'*'); };\n  window.setB = v => { tweaks.bg = v; applyTweaks(); window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweaks},'*'); };\n  window.setW = v => { tweaks.heroWeight = v; applyTweaks(); window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweaks},'*'); };\n\n  window.addEventListener('message', e => {\n    if (e.data?.type === '__activate_edit_mode') { buildPanel(); panel.style.display = 'block'; }\n    if (e.data?.type === '__deactivate_edit_mode' && panel) panel.style.display = 'none';\n  });\n  window.parent.postMessage({type:'__edit_mode_available'},'*');\n<\u002Fscript>\n\n\n<div style=\"position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; background: rgb(17, 17, 17); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 12px; padding: 1.25rem; min-width: 230px; font-family: &quot;DM Mono&quot;, monospace; font-size: 0.75rem; color: rgb(170, 170, 170); box-shadow: rgba(0, 0, 0, 0.7) 0px 8px 32px; display: block;\">\n      <div style=\"font-weight:600;color:#eee;margin-bottom:1rem;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase\">Tweaks<\u002Fdiv>\n      <div style=\"margin-bottom:.9rem\">\n        <div style=\"color:#666;margin-bottom:.45rem\">Accent<\u002Fdiv>\n        <div style=\"display:flex;gap:.35rem;flex-wrap:wrap\">\n          <button onclick=\"setA('oklch(70% 0.16 212)')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:oklch(70% 0.16 212);color:#000;font-size:.65rem;cursor:pointer;font-family:inherit;font-weight:700\">Blue<\u002Fbutton><button onclick=\"setA('oklch(70% 0.14 155)')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:oklch(70% 0.14 155);color:#000;font-size:.65rem;cursor:pointer;font-family:inherit;font-weight:700\">Green<\u002Fbutton><button onclick=\"setA('oklch(68% 0.16 20)')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:oklch(68% 0.16 20);color:#000;font-size:.65rem;cursor:pointer;font-family:inherit;font-weight:700\">Rose<\u002Fbutton><button onclick=\"setA('oklch(74% 0.15 75)')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:oklch(74% 0.15 75);color:#000;font-size:.65rem;cursor:pointer;font-family:inherit;font-weight:700\">Amber<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:.9rem\">\n        <div style=\"color:#666;margin-bottom:.45rem\">Background<\u002Fdiv>\n        <div style=\"display:flex;gap:.35rem\">\n          <button onclick=\"setB('#080808')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:#080808;color:#aaa;font-size:.65rem;cursor:pointer;font-family:inherit\">Pure<\u002Fbutton><button onclick=\"setB('#0d0b08')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:#0d0b08;color:#aaa;font-size:.65rem;cursor:pointer;font-family:inherit\">Warm<\u002Fbutton><button onclick=\"setB('#07090d')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:#07090d;color:#aaa;font-size:.65rem;cursor:pointer;font-family:inherit\">Cool<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"color:#666;margin-bottom:.45rem\">Title Weight<\u002Fdiv>\n        <div style=\"display:flex;gap:.35rem\">\n          <button onclick=\"setW('300')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:transparent;color:#aaa;font-size:.65rem;cursor:pointer;font-family:inherit\">Light<\u002Fbutton><button onclick=\"setW('400')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:transparent;color:#aaa;font-size:.65rem;cursor:pointer;font-family:inherit\">Regular<\u002Fbutton><button onclick=\"setW('500')\" style=\"padding:.28rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:transparent;color:#aaa;font-size:.65rem;cursor:pointer;font-family:inherit\">Medium<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv><\u002Fbody><\u002Fhtml>"
